name: ROCm artifact hashes

on:
  workflow_dispatch:

jobs:
  hash-rocm-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
      - name: Download tarballs and compute hashes
        shell: julia {0}
        run: |
          import Pkg
          Pkg.add("ArtifactUtils")
          using ArtifactUtils, Base.BinaryPlatforms

          for rocm_arch in [
            "gfx908",
            "gfx90a",
            "gfx94X-dcgpu",
            "gfx950-dcgpu",
            "gfx101X-dcgpu",
            "gfx103X-all",
            "gfx110X-all",
            "gfx1150",
            "gfx1151",
            "gfx1152",
            "gfx120X-all",
          ]
            @info rocm_arch
            platform = Platform("x86_64", "linux", Dict("libc" => "glibc", "rocm_arch" => rocm_arch))
            add_artifact!("Artifacts.toml", "ROCm", "https://repo.amd.com/rocm/tarball/therock-dist-linux-$rocm_arch-7.13.0.tar.gz"; lazy = true, platform)
          end
      - name: Upload hash report
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts.toml
          path: Artifacts.toml
